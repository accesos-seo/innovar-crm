<!doctype html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innovar Cocinas de Diseño · Pereira</title>
    <meta name="description" content="Diseñamos y fabricamos cocinas integrales, closets y muebles a medida en Pereira, Colombia. Tradición artesanal con diseño contemporáneo." />

    <!-- Favicon (logo local, ya no depende del bucket externo) -->
    <link rel="icon" type="image/png" href="/innovar-logo-black.png" />
    <link rel="apple-touch-icon" href="/innovar-logo-black.png" />

    <!-- Open Graph / WhatsApp / iMessage / Facebook
         Genérico — sin nombres de cliente ni números de cotización.
         Cuando un cliente reenvía el link, el destinatario ve "Innovar Cocinas"
         con la imagen del logo, sin exponer la identidad del cliente original. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Innovar Cocinas de Diseño" />
    <meta property="og:title" content="Innovar Cocinas de Diseño · Pereira" />
    <meta property="og:description" content="Cocinas integrales, closets y muebles a medida diseñados y fabricados artesanalmente en Pereira, Colombia." />
    <meta property="og:image" content="/innovar-logo-black.png" />
    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />
    <meta property="og:image:alt" content="Innovar Cocinas de Diseño" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Innovar Cocinas de Diseño · Pereira" />
    <meta property="twitter:description" content="Cocinas integrales, closets y muebles a medida diseñados y fabricados artesanalmente en Pereira, Colombia." />
    <meta property="twitter:image" content="/innovar-logo-black.png" />

    <!-- Theme color para el barra de Chrome/Android -->
    <meta name="theme-color" content="#131313" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
